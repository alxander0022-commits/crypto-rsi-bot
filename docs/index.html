<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crypto RSI Bot — Paper Trading</title>
<style>
  :root {
    --bg:#0d1117; --card:#161b22; --line:#30363d; --fg:#e6edf3; --mut:#8b949e;
    --green:#3fb950; --red:#f85149; --amber:#d29922; --blue:#58a6ff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:900px; margin:0 auto; padding:18px; }
  h1 { font-size:20px; margin:0; }
  .sub { color:var(--mut); font-size:13px; margin-top:4px; }
  .grid { display:grid; gap:12px; }
  .cards { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .k { color:var(--mut); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .v { font-size:22px; font-weight:700; margin-top:4px; }
  .big { font-size:28px; }
  .row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .pill { font-size:12px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); }
  .green { color:var(--green); } .red { color:var(--red); } .amber { color:var(--amber); } .mut { color:var(--mut); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:right; padding:8px 6px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--mut); font-weight:600; font-size:11px; text-transform:uppercase; }
  .sec { margin-top:22px; }
  .sec h2 { font-size:14px; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; margin:0 0 8px; }
  .bar { height:10px; border-radius:6px; background:linear-gradient(90deg,var(--red),var(--amber),var(--green)); position:relative; }
  .bar i { position:absolute; top:-3px; width:4px; height:16px; background:#fff; border-radius:2px; }
  .scroll { overflow-x:auto; }
  .foot { color:var(--mut); font-size:11px; margin-top:24px; text-align:center; line-height:1.6; }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f6f8fa; --card:#fff; --line:#d0d7de; --fg:#1f2328; --mut:#636c76; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div><h1>📈 Crypto RSI Bot</h1><div class="sub" id="sub">loading…</div></div>
    <div class="pill mut">PAPER · no real money</div>
  </div>

  <div class="grid cards sec" id="tiles"></div>

  <div class="sec"><h2>Signals</h2><div class="grid cards" id="coins"></div></div>

  <div class="sec"><h2>Market mood — Fear &amp; Greed</h2>
    <div class="card"><div class="row"><div class="v" id="fngval">—</div><div class="mut" id="fnglbl"></div></div>
      <div class="bar" style="margin-top:10px"><i id="fngmark" style="left:0%"></i></div></div>
  </div>

  <div class="sec"><h2>Open positions</h2><div class="card scroll"><table id="open"><tbody></tbody></table></div></div>

  <div class="sec"><h2>Closed trades</h2><div class="card scroll"><table id="trades"><tbody></tbody></table></div></div>

  <div class="foot" id="foot"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const money = n => (n<0?'-':'') + '$' + Math.abs(n).toLocaleString(undefined,{maximumFractionDigits:2});
const cls = n => n>0?'green':(n<0?'red':'mut');
const sign = n => (n>=0?'+':'') + n.toFixed(2);
const VERD = {BUY:'🟢 BUY', SELL:'🔴 SELL', NONE:'⛔ stay out'};

function tile(k,v,c){ return `<div class="card"><div class="k">${k}</div><div class="v big ${c||''}">${v}</div></div>`; }

async function load(){
  let d;
  try { d = await (await fetch('data.json?t='+Date.now())).json(); }
  catch(e){ $('#sub').textContent='could not load data.json yet'; return; }

  $('#sub').textContent = 'updated ' + d.updated;

  const p = d.portfolio, s = d.stats;
  $('#tiles').innerHTML =
    tile('Equity', money(p.equity_mtm), cls(p.return_pct)) +
    tile('Return', sign(p.return_pct)+'%', cls(p.return_pct)) +
    tile('Win rate', s.n_trades? s.win_rate+'%' : '—') +
    tile('Trades', s.n_trades);

  $('#coins').innerHTML = (d.coins||[]).map(c=>{
    const note = c.note? `<div class="sub amber">${c.note}</div>`:'';
    const vc = c.signal==='BUY'?'green':(c.signal==='SELL'?'red':'mut');
    return `<div class="card"><div class="row"><b>${c.short}</b><span class="pill mut">${c.trend}</span></div>
      <div class="v">RSI ${c.rsi}</div><div class="${vc}">${VERD[c.signal]||c.signal}</div>${note}</div>`;
  }).join('') || '<div class="mut">no data</div>';

  if(d.fng){ $('#fngval').textContent = d.fng.value+'/100';
    $('#fnglbl').textContent = d.fng.label; $('#fngmark').style.left = d.fng.value+'%'; }

  const ot = $('#open tbody');
  const oh = '<tr><th>Coin</th><th>Side</th><th>Entry</th><th>Now</th><th>Stop</th><th>Target</th><th>P&L</th></tr>';
  ot.innerHTML = oh + ((p.open||[]).map(o=>`<tr><td>${o.short}</td>
     <td class="${o.side==='long'?'green':'red'}">${o.side}</td>
     <td>${money(o.entry)}</td><td>${money(o.price)}</td><td>${money(o.stop)}</td><td>${money(o.target)}</td>
     <td class="${cls(o.upnl)}">${sign(o.upnl_pct)}%</td></tr>`).join('')
     || '<tr><td colspan="7" class="mut">no open positions</td></tr>');

  const tt = $('#trades tbody');
  const th = '<tr><th>Coin</th><th>Side</th><th>Entry</th><th>Exit</th><th>Result</th><th>P&L</th><th>Closed</th></tr>';
  tt.innerHTML = th + ((d.trades||[]).map(t=>`<tr><td>${(t.symbol||'').replace('USDT','')}</td>
     <td class="${t.side==='long'?'green':'red'}">${t.side}</td>
     <td>${money(+t.entry)}</td><td>${money(+t.exit)}</td><td class="mut">${t.reason}</td>
     <td class="${cls(+t.pnl_usd)}">${sign(+t.pnl_pct)}%</td><td class="mut">${(t.closed||'').slice(5,16)}</td></tr>`).join('')
     || '<tr><td colspan="7" class="mut">no closed trades yet</td></tr>');

  const st = d.settings;
  $('#foot').innerHTML = `Simulated money only — this bot never places real trades.<br>
     Strategy: trend + RSI reversal · buy&lt;${st.rsi_buy} / sell&gt;${st.rsi_sell} ·
     ${st.stop_pct}% stop · ${st.target_pct}% target · ${st.trade_fraction}% per trade · start ${money(p.start)}`;
}
load();
setInterval(load, 120000); // refresh every 2 min
</script>
</body>
</html>
